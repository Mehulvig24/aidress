<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aidress — AI Discovery, Reputation, Exchange &amp; Settlement System</title>
  <style>
    /* ── Design tokens ───────────────────────────────────────────────────── */
    :root {
      --bg:          #07090f;
      --surface:     #0d1117;
      --card:        #111827;
      --border:      #1f2937;
      --border-hi:   #1e3a5f;
      --accent:      #38bdf8;
      --accent-dim:  rgba(56,189,248,0.10);
      --accent-glow: rgba(56,189,248,0.25);
      --green:       #34d399;
      --yellow:      #fbbf24;
      --red:         #f87171;
      --text:        #e2e8f0;
      --text-mid:    #94a3b8;
      --text-dim:    #4b5563;
      --mono:        'Courier New', Consolas, monospace;
      --sans:        -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      --radius:      10px;
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      position: relative;
      padding: 72px 24px 80px;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    /* dot-grid background */
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(56,189,248,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* fade-out bottom */
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(transparent, var(--bg));
      pointer-events: none;
    }

    .header-inner {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .logo-box {
      width: 46px;
      height: 46px;
      background: linear-gradient(135deg, var(--accent) 0%, #0ea5e9 100%);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 21px;
      font-weight: 800;
      color: #05080f;
      box-shadow: 0 0 32px var(--accent-glow);
    }

    .logo-label {
      font-family: var(--mono);
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--text);
    }

    .header-title {
      font-size: clamp(18px, 3.5vw, 32px);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.4px;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    .header-sub {
      font-size: 15px;
      color: var(--text-mid);
      max-width: 460px;
      margin: 0 auto;
    }

    /* ── Page body ───────────────────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 52px 20px 96px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    /* ── Section card ────────────────────────────────────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }

    .section-num {
      width: 24px;
      height: 24px;
      background: var(--accent-dim);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .section-name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-mid);
    }

    .section-body { padding: 22px; }

    /* ── Inputs ──────────────────────────────────────────────────────────── */
    .row { display: flex; gap: 10px; align-items: stretch; }

    input[type="text"], input[type="email"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--mono);
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      min-width: 0;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
    }

    input::placeholder { color: var(--text-dim); }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      background: var(--accent);
      color: #05080f;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--sans);
      letter-spacing: .6px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
    }

    .btn:hover  { opacity: .85; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── Result area ─────────────────────────────────────────────────────── */
    .result { margin-top: 18px; }

    /* ── Loader ──────────────────────────────────────────────────────────── */
    .loader {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
    }

    .spin {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error message ───────────────────────────────────────────────────── */
    .msg-error {
      padding: 12px 16px;
      background: rgba(248,113,113,.07);
      border: 1px solid rgba(248,113,113,.18);
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
    }

    /* ── Trust card ──────────────────────────────────────────────────────── */
    .trust-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: rise .25s ease;
    }

    @keyframes rise {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* decision banner */
    .banner {
      padding: 11px 18px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .banner.proceed {
      background: rgba(52,211,153,.10);
      color: var(--green);
      border-bottom: 1px solid rgba(52,211,153,.18);
    }
    .banner.caution {
      background: rgba(251,191,36,.08);
      color: var(--yellow);
      border-bottom: 1px solid rgba(251,191,36,.18);
    }
    .banner.abort {
      background: rgba(248,113,113,.08);
      color: var(--red);
      border-bottom: 1px solid rgba(248,113,113,.18);
    }

    .banner-reason {
      font-weight: 400;
      opacity: .75;
      letter-spacing: .5px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* card body */
    .card-body { padding: 20px; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .agent-id {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .agent-org  { font-size: 13px; color: var(--text-mid); }
    .agent-dom  { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 8px;
    }

    .badge.yes { background: rgba(52,211,153,.10); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
    .badge.no  { background: rgba(248,113,113,.10); color: var(--red);   border: 1px solid rgba(248,113,113,.2); }

    .score-block { flex-shrink: 0; text-align: right; }

    .score-num {
      font-family: var(--mono);
      font-size: 56px;
      font-weight: 700;
      line-height: 1;
    }

    .score-num.green  { color: var(--green);  text-shadow: 0 0 24px rgba(52,211,153,.35); }
    .score-num.yellow { color: var(--yellow); text-shadow: 0 0 24px rgba(251,191,36,.35); }
    .score-num.red    { color: var(--red);    text-shadow: 0 0 24px rgba(248,113,113,.35); }

    .score-denom { font-family: var(--mono); font-size: 12px; color: var(--text-dim); text-align: right; }

    /* ── Card sub-sections ───────────────────────────────────────────────── */
    .card-section { margin-bottom: 16px; }
    .card-section:last-child { margin-bottom: 0; }

    .sub-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* capability / flag tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }

    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 11px;
    }

    .tag.cap {
      background: var(--accent-dim);
      border: 1px solid rgba(56,189,248,.16);
      color: var(--accent);
    }

    .tag.flag {
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.2);
      color: var(--red);
    }

    /* routing grid */
    .routing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }

    .r-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
    }

    .r-key { font-size: 9px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 3px; }
    .r-val { font-family: var(--mono); font-size: 12px; color: var(--text); overflow-wrap: anywhere; }

    /* ── Discover results grid ───────────────────────────────────────────── */
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      animation: rise .25s ease;
    }

    .mini-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      transition: border-color .15s;
      position: relative;
    }

    .mini-card:hover { border-color: var(--border-hi); }

    .mini-rank {
      position: absolute;
      top: 12px;
      right: 12px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    .mini-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-right: 28px; }
    .mini-id  { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .mini-org { font-size: 11px; color: var(--text-dim); }

    .mini-score { font-family: var(--mono); font-size: 26px; font-weight: 700; line-height: 1; }
    .mini-score.green  { color: var(--green);  }
    .mini-score.yellow { color: var(--yellow); }
    .mini-score.red    { color: var(--red);    }

    .mini-ep {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Register form ───────────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .field input { width: 100%; }

    .reg-result {
      margin-top: 16px;
      padding: 13px 16px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      animation: rise .25s ease;
    }

    .reg-result.ok  { background: rgba(52,211,153,.07); border: 1px solid rgba(52,211,153,.2); color: var(--green); }
    .reg-result.err { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); color: var(--red); }

    /* ── Server ping indicator ───────────────────────────────────────────── */
    .ping-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-ping {
      background: transparent;
      border: 1px solid var(--border-hi);
      border-radius: 7px;
      color: var(--text-mid);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .btn-ping:hover { border-color: var(--accent); color: var(--accent); }
    .btn-ping:disabled { opacity: .4; cursor: not-allowed; }

    #ping-status {
      font-family: var(--mono);
      font-size: 11px;
      display: none;
      align-items: center;
      gap: 7px;
    }

    #ping-status .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 28px 24px 40px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
    }

    footer code { color: var(--accent); font-family: var(--mono); }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 52px 16px 64px; }
      main   { padding: 32px 14px 72px; gap: 28px; }
      .card-top { flex-direction: column; }
      .score-block { display: flex; align-items: baseline; gap: 4px; text-align: left; }
      .score-num  { font-size: 42px; }
      .form-grid  { grid-template-columns: 1fr; }
      .row        { flex-direction: column; }
      .btn        { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════ HEADER ═══════════════════════════ -->
<header>
  <div class="header-inner">
    <div class="wordmark">
      <div class="logo-box">A</div>
      <div class="logo-label">AIDRESS</div>
    </div>
    <h1 class="header-title">Trust infrastructure for autonomous AI agents</h1>
    <p class="header-sub">Verify any agent before your AI transacts with it</p>

    <!-- Diagnostic ping button -->
    <div class="ping-row">
      <button class="btn-ping" id="ping-btn" onclick="doServerPing()">⬡ Test Server</button>
      <div id="ping-status">
        <div class="dot" id="ping-dot"></div>
        <span id="ping-text"></span>
      </div>
    </div>
  </div>
</header>

<main>

  <!-- ═══════════════════════════════ 01 VERIFY ════════════════════════════ -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">01</div>
      <div class="section-name">Verify Agent</div>
    </div>
    <div class="section-body">
      <div class="row">
        <input type="text" id="verify-input"
               placeholder="Enter agent ID"
               value="agent_freightbot_01">
        <button class="btn" id="verify-btn" onclick="doVerify()">Verify</button>
      </div>
      <div class="result" id="verify-result"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ 02 DISCOVER ══════════════════════════ -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">02</div>
      <div class="section-name">Discover Agents</div>
    </div>
    <div class="section-body">
      <div class="row">
        <input type="text" id="match-input"
               placeholder="Required capabilities, comma-separated — e.g. freight_booking, customs_clearance">
        <button class="btn" id="match-btn" onclick="doMatch()">Find Agents</button>
      </div>
      <div class="result" id="match-result"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ 03 REGISTER ══════════════════════════ -->
  <div class="section">
    <div class="section-head">
      <div class="section-num">03</div>
      <div class="section-name">Register Agent</div>
    </div>
    <div class="section-body">
      <div class="form-grid">
        <div class="field">
          <label>Agent ID</label>
          <input type="text" id="reg-id"     placeholder="my_agent_01">
        </div>
        <div class="field">
          <label>Organisation</label>
          <input type="text" id="reg-org"    placeholder="Acme Logistics">
        </div>
        <div class="field">
          <label>Domain</label>
          <input type="text" id="reg-domain" placeholder="acme-logistics.com">
        </div>
        <div class="field">
          <label>Contact Email</label>
          <input type="email" id="reg-email" placeholder="bot@acme-logistics.com">
        </div>
      </div>
      <button class="btn" id="reg-btn" onclick="doRegister()">Register Agent</button>
      <div id="register-result"></div>
    </div>
  </div>

</main>

<footer>
  <code>Aidress</code> — AI Discovery, Reputation, Exchange &amp; Settlement System &nbsp;·&nbsp; Trust registry for AI agents
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════════════════ */
const BASE = 'https://aidress.onrender.com';

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════════════════ */

// Escape HTML to prevent XSS in rendered agent data
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Show a spinner + message inside an element
function showLoader(el, msg) {
  el.innerHTML = `<div class="loader"><div class="spin"></div><span>${esc(msg)}</span></div>`;
}

// Determine CSS class and decision text from a trust score + flags
function decision(score, flags = []) {
  if (flags.includes('unregistered') || score < 40) {
    const why = flags.includes('unregistered')
      ? 'Agent not in Aidress registry'
      : `Trust score ${score}/100 — below minimum threshold`;
    return { cls: 'abort', label: '✗  ABORT', reason: why };
  }
  if (score < 70) {
    return { cls: 'caution', label: '⚠  CAUTION', reason: `Trust score ${score}/100 — proceed with reduced limits` };
  }
  return { cls: 'proceed', label: '●  PROCEED', reason: `Trust score ${score}/100 — confidence threshold met` };
}

// Map score to a CSS colour class
function scoreClass(s) { return s >= 70 ? 'green' : s >= 40 ? 'yellow' : 'red'; }

/* ═══════════════════════════════════════════════════════════════════════════
   API CALLER — with automatic 503 retry for Render cold-starts
═══════════════════════════════════════════════════════════════════════════ */
async function callPACT(path, body, statusEl, maxRetries = 12) {
  for (let attempt = 1; attempt <= maxRetries; attempt++) {
    try {
      const res = await fetch(BASE + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      // Render free tier returns 503 while spinning up — keep retrying
      if (res.status === 503 && attempt < maxRetries) {
        showLoader(statusEl, `Aidress server warming up, please wait… (${attempt}/${maxRetries - 1})`);
        await sleep(5000);
        continue;
      }

      let data;
      const text = await res.text();
      try { data = JSON.parse(text); }
      catch { data = { detail: `HTTP ${res.status} — unexpected server response` }; }

      return { ok: res.ok, status: res.status, data };

    } catch (err) {
      // Network / fetch error
      if (attempt < maxRetries) {
        showLoader(statusEl, `Connecting to Aidress… (${attempt}/${maxRetries - 1})`);
        await sleep(5000);
      } else {
        return { ok: false, status: 0, data: { detail: 'Could not reach Aidress server.' } };
      }
    }
  }
  return { ok: false, status: 503, data: { detail: 'Server unavailable after retries.' } };
}

/* ═══════════════════════════════════════════════════════════════════════════
   RENDERERS
═══════════════════════════════════════════════════════════════════════════ */

// Render the full trust card for a single agent
function renderTrustCard(d) {
  const score  = d.trust_score ?? 0;
  const dc     = decision(score, d.flags || []);
  const sClass = scoreClass(score);

  const capTags  = (d.capabilities || []).map(c => `<span class="tag cap">${esc(c)}</span>`).join('');
  const flagTags = (d.flags || []).map(f => `<span class="tag flag">${esc(f)}</span>`).join('');

  const capsSection = capTags ? `
    <div class="card-section">
      <div class="sub-label">Capabilities</div>
      <div class="tags">${capTags}</div>
    </div>` : '';

  const flagSection = flagTags ? `
    <div class="card-section">
      <div class="sub-label">Flags</div>
      <div class="tags">${flagTags}</div>
    </div>` : '';

  const r = d.routing || {};
  const routingItems = [
    r.endpoint_url          && `<div class="r-item"><div class="r-key">Endpoint</div><div class="r-val">${esc(r.endpoint_url)}</div></div>`,
    r.protocol              && `<div class="r-item"><div class="r-key">Protocol</div><div class="r-val">${esc(r.protocol)}</div></div>`,
    r.settlement_rail       && `<div class="r-item"><div class="r-key">Settlement</div><div class="r-val">${esc(r.settlement_rail)}</div></div>`,
    r.accepted_terms_format && `<div class="r-item"><div class="r-key">Terms Format</div><div class="r-val">${esc(r.accepted_terms_format)}</div></div>`,
  ].filter(Boolean).join('');

  const routingSection = routingItems ? `
    <div class="card-section">
      <div class="sub-label">Routing</div>
      <div class="routing-grid">${routingItems}</div>
    </div>` : '';

  return `
    <div class="trust-card">
      <div class="banner ${dc.cls}">
        <span>${dc.label}</span>
        <span class="banner-reason">${esc(dc.reason)}</span>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="agent-id">${esc(d.agent_id)}</div>
            ${d.org_name   ? `<div class="agent-org">${esc(d.org_name)}</div>` : ''}
            ${d.org_domain ? `<div class="agent-dom">${esc(d.org_domain)}</div>` : ''}
            <div class="badge ${d.verified ? 'yes' : 'no'}">
              ${d.verified ? '✓ VERIFIED' : '✗ UNVERIFIED'}
            </div>
          </div>
          <div class="score-block">
            <div class="score-num ${sClass}">${score}</div>
            <div class="score-denom">/100 trust score</div>
          </div>
        </div>
        ${capsSection}
        ${routingSection}
        ${flagSection}
      </div>
    </div>`;
}

// Render a compact card used in the /match results grid
function renderMiniCard(d, rank) {
  const score  = d.trust_score ?? 0;
  const sClass = scoreClass(score);
  const caps   = (d.capabilities || []).map(c => `<span class="tag cap">${esc(c)}</span>`).join('');
  const ep     = d.routing?.endpoint_url || '';

  return `
    <div class="mini-card">
      <div class="mini-rank">#${rank}</div>
      <div class="mini-top">
        <div>
          <div class="mini-id">${esc(d.agent_id)}</div>
          <div class="mini-org">${esc(d.org_name || '')}</div>
        </div>
        <div>
          <div class="mini-score ${sClass}">${score}</div>
          <div class="score-denom" style="font-size:10px">/100</div>
        </div>
      </div>
      <div class="tags">${caps}</div>
      ${ep ? `<div class="mini-ep">${esc(ep)}</div>` : ''}
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   DIAGNOSTIC — ping GET /registry and show raw result
═══════════════════════════════════════════════════════════════════════════ */
async function doServerPing() {
  const btn  = document.getElementById('ping-btn');
  const wrap = document.getElementById('ping-status');
  const dot  = document.getElementById('ping-dot');
  const txt  = document.getElementById('ping-text');

  btn.disabled = true;
  wrap.style.display = 'inline-flex';
  dot.style.background = 'var(--text-dim)';
  txt.textContent = 'pinging…';

  try {
    const res  = await fetch(BASE + '/registry');
    const body = await res.text();

    if (res.ok) {
      // Parse to count agents
      let count = '?';
      try { count = JSON.parse(body).length; } catch {}
      dot.style.background = 'var(--green)';
      txt.textContent = `Server alive — ${count} trusted agent(s) in registry  (HTTP ${res.status})`;
    } else {
      // Server replied but with an error — show status + raw body excerpt
      const excerpt = body.slice(0, 200).replace(/\n/g, ' ');
      dot.style.background = 'var(--yellow)';
      txt.textContent = `HTTP ${res.status} — ${excerpt}`;
    }
  } catch (err) {
    // Network-level failure (CORS, DNS, no connection)
    dot.style.background = 'var(--red)';
    txt.textContent = `Unreachable — ${err.message}`;
  }

  btn.disabled = false;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SHARED ERROR RENDERER — shows HTTP status + actual API error message
═══════════════════════════════════════════════════════════════════════════ */
function showError(el, status, data) {
  // Surface every scrap of diagnostic info we have
  const detail  = data?.detail || data?.message || JSON.stringify(data);
  const label   = status === 0 ? 'Network error' : `HTTP ${status}`;
  el.innerHTML  = `
    <div class="msg-error">
      <strong>${label}</strong><br>
      <span style="opacity:.75">${esc(detail)}</span>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   01  VERIFY
═══════════════════════════════════════════════════════════════════════════ */
async function doVerify() {
  const id  = document.getElementById('verify-input').value.trim();
  if (!id) return;

  const el  = document.getElementById('verify-result');
  const btn = document.getElementById('verify-btn');
  btn.disabled = true;
  showLoader(el, 'Querying Aidress registry…');

  const { ok, status, data } = await callPACT('/verify', { agent_id: id }, el);

  // /verify always returns 200 (unknown agents get a safe default trust object).
  // Any non-200 means a server/network problem — show the raw error.
  if (!ok || status === 0) {
    showError(el, status, data);
  } else {
    el.innerHTML = renderTrustCard(data);
  }
  btn.disabled = false;
}

/* ═══════════════════════════════════════════════════════════════════════════
   02  DISCOVER
═══════════════════════════════════════════════════════════════════════════ */
async function doMatch() {
  const raw = document.getElementById('match-input').value.trim();
  if (!raw) return;

  const caps = raw.split(',').map(s => s.trim()).filter(Boolean);
  const el   = document.getElementById('match-result');
  const btn  = document.getElementById('match-btn');
  btn.disabled = true;
  showLoader(el, `Searching for agents with: ${caps.join(', ')}`);

  const { ok, status, data } = await callPACT('/match', { required_capabilities: caps }, el);

  if (!ok || status === 0) {
    showError(el, status, data);
  } else if (!Array.isArray(data) || data.length === 0) {
    el.innerHTML = `<div class="msg-error" style="color:var(--text-dim)">No verified agents match those capabilities.</div>`;
  } else {
    el.innerHTML = `<div class="agents-grid">${data.map((a, i) => renderMiniCard(a, i + 1)).join('')}</div>`;
  }
  btn.disabled = false;
}

/* ═══════════════════════════════════════════════════════════════════════════
   03  REGISTER
═══════════════════════════════════════════════════════════════════════════ */
async function doRegister() {
  const agentId = document.getElementById('reg-id').value.trim();
  const orgName = document.getElementById('reg-org').value.trim();
  const domain  = document.getElementById('reg-domain').value.trim();
  const email   = document.getElementById('reg-email').value.trim();

  const el  = document.getElementById('register-result');
  const btn = document.getElementById('reg-btn');

  if (!agentId || !orgName || !domain || !email) {
    el.innerHTML = `<div class="reg-result err">All four fields are required.</div>`;
    return;
  }

  btn.disabled = true;
  showLoader(el, 'Submitting registration to Aidress…');

  const { ok, status, data } = await callPACT('/register', {
    agent_id:      agentId,
    org_name:      orgName,
    org_domain:    domain,
    contact_email: email,
  }, el);

  if (status === 0) {
    showError(el, status, data);
  } else if (!ok) {
    // 409 conflict or other API-level rejection — show actual message
    el.innerHTML = `<div class="reg-result err">✗  HTTP ${status} — ${esc(data.detail || JSON.stringify(data))}</div>`;
  } else {
    el.innerHTML = `
      <div class="reg-result ok">
        ✓  Agent <strong>${esc(data.agent_id)}</strong> registered<br>
        Status: ${esc(data.status)}<br>
        <span style="opacity:.65">${esc(data.message || '')}</span>
      </div>`;
  }
  btn.disabled = false;
}

/* ═══════════════════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS — Enter submits each section
═══════════════════════════════════════════════════════════════════════════ */
document.getElementById('verify-input').addEventListener('keydown', e => { if (e.key === 'Enter') doVerify(); });
document.getElementById('match-input').addEventListener('keydown',  e => { if (e.key === 'Enter') doMatch(); });
</script>
